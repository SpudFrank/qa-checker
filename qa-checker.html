<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物料质量检查系统</title>
<script>
// Tesseract.js v5 CDN - load async
(function() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
  s.onerror = function() { window._tesseractLoadFailed = 1; };
  document.head.appendChild(s);
})();
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; color: #2d3436; min-height: 100vh; }

/* Header */
.header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; }
.header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 22px; color: #2d3436; }
.header .subtitle { font-size: 13px; color: #888; margin-top: 2px; }
.btn-reset { font-size: 13px; color: #666; background: none; border: none; cursor: pointer; text-decoration: underline; }
.btn-reset:hover { color: #333; }
.btn-reset.hidden { display: none; }

/* Steps */
.steps { display: flex; align-items: center; justify-content: center; gap: 0; margin: 24px 0; }
.step-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; background: #ddd; color: #999; transition: all 0.3s; }
.step-dot.active { background: #3b82f6; color: #fff; }
.step-dot.done { background: #22c55e; color: #fff; }
.step-line { width: 48px; height: 3px; background: #ddd; transition: all 0.3s; }
.step-line.done { background: #3b82f6; }
.step-label { font-size: 12px; color: #999; margin-left: 8px; }

/* Container */
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px 40px; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
.card { background: #fff; border: 2px solid #e0e0e0; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; text-align: center; }
.card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(59,130,246,0.1); }
.card.selected { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 2px 12px rgba(59,130,246,0.15); }
.card .icon { font-size: 28px; margin-bottom: 8px; display: block; }
.card .name { font-size: 14px; font-weight: 600; color: #333; }
.card .desc { font-size: 12px; color: #999; margin-top: 4px; }
.card.selected .name { color: #1d4ed8; }

/* Section */
.section { background: #fff; border-radius: 12px; padding: 24px; border: 1px solid #e0e0e0; }
.section h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

/* Upload */
.upload-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-zone:hover { border-color: #3b82f6; background: #f8faff; }
.upload-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
.upload-zone .upload-icon { font-size: 36px; color: #ccc; display: block; margin-bottom: 8px; }
.upload-zone .upload-text { font-size: 14px; color: #888; }
.upload-zone .upload-hint { font-size: 12px; color: #aaa; margin-top: 4px; }

/* Image list */
.image-list { margin-top: 16px; }
.image-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px; background: #fafafa; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eee; }
.image-item .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #e0e0e0; flex-shrink: 0; }
.image-item .info { flex: 1; min-width: 0; }
.image-item .info .filename { font-size: 13px; font-weight: 500; color: #333; word-break: break-all; }
.image-item .info .meta { font-size: 12px; color: #999; margin-top: 2px; }
.lang-badge { display: inline-block; background: #dbeafe; color: #1d4ed8; font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-right: 4px; font-weight: 500; }
.image-item .info textarea { width: 100%; margin-top: 8px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; padding: 8px; resize: vertical; min-height: 40px; font-family: inherit; }
.image-item .info textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.btn-primary:hover:not(:disabled) { background: #2563eb; }
.btn-outline { background: #fff; color: #3b82f6; border-color: #3b82f6; }
.btn-outline:hover:not(:disabled) { background: #eff6ff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: #fff; color: #ef4444; border-color: #fca5a5; }
.btn-danger:hover:not(:disabled) { background: #fef2f2; }
.btn-ocr { background: #fff; color: #3b82f6; border: 1px solid #93c5fd; }
.btn-ocr:hover:not(:disabled) { background: #eff6ff; }
.btn-ocr.loading { color: #93c5fd; }
.btn-row { display: flex; gap: 8px; align-items: center; }

/* Textarea */
.req-textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 120px; }
.req-textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

/* Results */
.result-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.result-card { border-radius: 10px; padding: 14px; text-align: center; border: 1px solid; }
.result-card .count { font-size: 28px; font-weight: 700; }
.result-card .label { font-size: 12px; margin-top: 2px; }
.result-card.pass { background: #f0fdf4; border-color: #bbf7d0; }
.result-card.pass .count { color: #16a34a; }
.result-card.pass .label { color: #15803d; }
.result-card.fail { background: #fef2f2; border-color: #fecaca; }
.result-card.fail .count { color: #dc2626; }
.result-card.fail .label { color: #b91c1c; }
.result-card.warn { background: #fffbeb; border-color: #fde68a; }
.result-card.warn .count { color: #d97706; }
.result-card.warn .label { color: #b45309; }
.result-card.manual { background: #faf5ff; border-color: #e9d5ff; }
.result-card.manual .count { color: #9333ea; }
.result-card.manual .label { color: #7e22ce; }

.check-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: 10px; margin-bottom: 8px; border: 1px solid; }
.check-item .status-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: bold; }
.check-item.pass { background: #f0fdf4; border-color: #bbf7d0; }
.check-item.pass .status-icon { background: #16a34a; color: #fff; }
.check-item.fail { background: #fef2f2; border-color: #fecaca; }
.check-item.fail .status-icon { background: #dc2626; color: #fff; }
.check-item.warn { background: #fffbeb; border-color: #fde68a; }
.check-item.warn .status-icon { background: #d97706; color: #fff; }
.check-item.manual { background: #faf5ff; border-color: #e9d5ff; }
.check-item.manual .status-icon { background: #9333ea; color: #fff; }
.check-item.pending { background: #f9fafb; border-color: #e5e7eb; }
.check-item.pending .status-icon { background: #9ca3af; color: #fff; }
.check-item .check-body { flex: 1; }
.check-item .check-label { font-size: 14px; font-weight: 500; }
.check-item .check-desc { font-size: 12px; color: #888; margin-top: 2px; }
.check-item .check-detail { font-size: 12px; background: #fff; border-radius: 6px; padding: 8px; margin-top: 8px; border: 1px solid #eee; color: #555; }
.check-item .status-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
.check-item.pass .status-badge { background: #bbf7d0; color: #15803d; }
.check-item.fail .status-badge { background: #fecaca; color: #b91c1c; }
.check-item.warn .status-badge { background: #fde68a; color: #92400e; }
.check-item.manual .status-badge { background: #e9d5ff; color: #7e22ce; }
.check-item.pending .status-badge { background: #e5e7eb; color: #6b7280; }

.verdict { padding: 16px; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; border: 1px solid; }
.verdict.fail { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
.verdict.warn { background: #fffbeb; border-color: #fde68a; color: #92400e; }
.verdict.pass { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.upload-status { margin-top: 8px; padding: 8px 12px; border-radius: 8px; font-size: 13px; display: none; }
.upload-status.show { display: block; }
.upload-status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.upload-status.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

.section-nav { display: flex; gap: 8px; }
.hidden { display: none !important; }

/* Diff comparison view */
.diff-toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.diff-container { margin-top: 16px; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.diff-toolbar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fafafa; border-bottom: 1px solid #e0e0e0; }
.diff-match-bar { height: 6px; background: #e5e7eb; }
.diff-match-bar-fill { height: 100%; transition: width 0.4s; }
.diff-table-header { display: flex; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; font-size: 12px; font-weight: 600; color: #666; }
.diff-th-ocr { flex: 1; padding: 8px 14px; border-right: 1px solid #e0e0e0; }
.diff-th-req { flex: 1; padding: 8px 14px; }
.diff-th-status { width: 72px; padding: 8px 6px; text-align: center; border-right: 1px solid #e0e0e0; font-size: 11px; }
.diff-table-body { max-height: 450px; overflow-y: auto; }
.diff-row { display: flex; border-bottom: 1px solid #f0f0f0; min-height: 38px; }
.diff-row:last-child { border-bottom: none; }
.diff-row.ignored { opacity: 0.4; }
.diff-row.ignored .diff-cell-ocr,
.diff-row.ignored .diff-cell-req { text-decoration: line-through; text-decoration-color: #999; }
.diff-cell-ocr { flex: 1; padding: 8px 14px; border-right: 1px solid #f0f0f0; font-size: 13px; line-height: 1.6; word-break: break-word; font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; background: #fafdfa; }
.diff-cell-req { flex: 1; padding: 8px 14px; font-size: 13px; line-height: 1.6; word-break: break-word; font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; background: #fdfafa; }
.diff-cell-empty { color: #ccc; font-style: italic; }
.diff-cell-status { width: 72px; padding: 6px 4px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #f0f0f0; }
.diff-row.match .diff-cell-status { color: #16a34a; }
.diff-row.partial .diff-cell-status { color: #d97706; }
.diff-row.extra .diff-cell-status { color: #3b82f6; }
.diff-row.missing .diff-cell-status { color: #dc2626; }
.diff-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
.diff-row.match .diff-badge { background: #dcfce7; color: #15803d; }
.diff-row.partial .diff-badge { background: #fef3c7; color: #92400e; }
.diff-row.extra .diff-badge { background: #dbeafe; color: #1d4ed8; }
.diff-row.missing .diff-badge { background: #fee2e2; color: #b91c1c; }
.diff-ignore-btn { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid #ddd; background: #fff; color: #999; cursor: pointer; white-space: nowrap; }
.diff-ignore-btn:hover { border-color: #f59e0b; color: #d97706; background: #fffbeb; }
.diff-row.ignored .diff-ignore-btn { border-color: #f59e0b; color: #d97706; background: #fffbeb; }
.diff-cell-ocr .w-extra { background: #d1fae5; border-radius: 2px; padding: 0 1px; }
.diff-cell-req .w-miss { background: #fee2e2; border-radius: 2px; padding: 0 1px; text-decoration: line-through; }
.diff-cell-ocr .w-near { background: #fef3c7; border-radius: 2px; padding: 0 1px; }
.diff-cell-req .w-near { background: #fef3c7; border-radius: 2px; padding: 0 1px; }
.diff-empty { color: #aaa; font-style: italic; padding: 24px; text-align: center; }
.diff-reasons { padding: 14px 16px; border-top: 1px solid #e0e0e0; background: #fafafa; font-size: 13px; color: #555; line-height: 1.8; }
.diff-reasons strong { color: #333; }
.diff-reason-item { display: flex; align-items: flex-start; gap: 8px; margin: 4px 0; }
.diff-reason-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
.diff-reason-dot.ok { background: #16a34a; }
.diff-reason-dot.warn { background: #d97706; }
.diff-reason-dot.fail { background: #dc2626; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>&#128269; 物料质量检查系统</h1>
      <div class="subtitle">上传美术物料和需求文本，自动检查内容一致性 <span id="versionBadge" style="color:#aaa;font-size:11px;"></span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;" id="apiConfigArea">
        <select id="providerSelect" onchange="switchProvider()" style="font-size:11px;border:1px solid #ddd;border-radius:6px;padding:4px 6px;">
          <option value="baidu" selected>百度云OCR</option>
          <option value="generic">通用AI API</option>
        </select>
        <!-- Baidu fields -->
        <span id="baiduFields">
          <input type="text" id="baiduApiKey" placeholder="API Key" style="width:140px;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-family:monospace;" onchange="saveBaiduConfig()">
          <input type="password" id="baiduSecretKey" placeholder="Secret Key" style="width:140px;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-family:monospace;" onchange="saveBaiduConfig()">
        </span>
        <!-- Generic AI fields -->
        <span id="genericFields" style="display:none;">
          <input type="password" id="apiKeyInput" placeholder="任意厂商 API Key" style="width:200px;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-family:monospace;" onchange="saveApiKey()">
        </span>
        <button id="btnTestApi" class="btn btn-sm btn-outline" onclick="testApiKey()" style="font-size:11px;padding:3px 8px;">连接测试</button>
        <span id="apiKeyStatus" style="font-size:11px;color:#999;white-space:nowrap;"></span>
      </div>
      <button class="btn-reset hidden" id="btnReset" onclick="resetAll()">重新开始</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- Step indicator -->
  <div class="steps" style="margin-bottom:24px;">
    <div class="step-dot active" id="stepDot1">1</div><div class="step-line" id="stepLine1"></div>
    <div class="step-dot" id="stepDot2">2</div><div class="step-line" id="stepLine2"></div>
    <div class="step-dot" id="stepDot3">3</div><div class="step-line" id="stepLine3"></div>
    <div class="step-dot" id="stepDot4">4</div>
    <span class="step-label" id="stepLabel">选择类别</span>
  </div>

  <!-- Step 1: Category -->
  <div id="step1">
    <h2 style="font-size:16px;margin-bottom:14px;">选择物料类别</h2>
    <div class="cards" id="categoryCards"></div>
    <div id="selectedCategoryInfo" class="hidden" style="margin-top:14px;padding:14px;background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;font-size:13px;color:#1d4ed8;"></div>
  </div>

  <!-- Step 2: Upload -->
  <div id="step2" class="hidden">
    <div class="section">
      <div class="section-header">
        <h2 id="step2Title">上传待检查物料</h2>
        <div class="section-nav">
          <button class="btn btn-outline btn-sm" onclick="goToStep(1)">返回</button>
          <button class="btn btn-primary btn-sm" id="btnNextTo3" onclick="goToStep(3)">下一步：输入需求</button>
        </div>
      </div>
      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">&#128206;</span>
        <span class="upload-text">点击选择图片，或拖拽到此处</span>
        <span class="upload-hint">支持 PNG、JPG、WebP，可多选</span>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
      </div>
      <div class="upload-status" id="uploadStatus"></div>
      <div class="image-list" id="imageList"></div>
    </div>
  </div>

  <!-- Step 3: Requirements -->
  <div id="step3" class="hidden">
    <div class="section">
      <div class="section-header">
        <h2>输入需求文本</h2>
        <button class="btn btn-outline btn-sm" onclick="goToStep(2)">返回上一步</button>
      </div>
      <p style="font-size:13px;color:#888;margin-bottom:10px;">请粘贴或输入对应物料的需求文本（活动名称、时间、CDK码、作者等信息）</p>
      <textarea class="req-textarea" id="reqText" placeholder="例如：&#10;活动名称：XXX&#10;活动时间：2024/01/15 - 2024/01/30&#10;兑换码：ABCD-1234-EFGH&#10;作者：张三&#10;..." oninput="scheduleDiffRefresh()"></textarea>
      <div class="diff-toggle-row">
        <button class="btn btn-outline btn-sm" id="btnToggleDiff" onclick="toggleDiffView()">
          &#128065; 查看OCR对照
        </button>
        <span id="diffRefreshHint" style="font-size:11px;color:#999;"></span>
      </div>
      <div class="diff-container hidden" id="diffContainer">
        <div class="diff-toolbar">
          <span style="font-size:13px;font-weight:600;">&#128065; OCR vs 需求 逐行对照</span>
          <span style="font-size:12px;color:#888;" id="diffRefreshHint"></span>
          <div style="flex:1;"></div>
          <span style="font-size:12px;color:#666;">已忽略 <strong id="diffIgnoredCount">0</strong> 行</span>
          <button class="btn btn-sm btn-outline" onclick="clearIgnoredLines()" style="font-size:11px;">清除忽略</button>
        </div>
        <div class="diff-match-bar" id="diffMatchBar">
          <div class="diff-match-bar-fill" id="diffMatchBarFill"></div>
        </div>
        <div class="diff-table-header">
          <div class="diff-th-ocr">OCR识别结果</div>
          <div class="diff-th-status"></div>
          <div class="diff-th-req">需求文本</div>
        </div>
        <div class="diff-table-body" id="diffTableBody">
          <div class="diff-empty">请先在上一步识别图片文字，然后输入需求文本</div>
        </div>
        <div class="diff-reasons hidden" id="diffReasons"></div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn btn-primary" id="btnStartCheck" onclick="startCheck()" style="width:100%;justify-content:center;padding:12px;">
          &#128270; 开始检查
        </button>
      </div>
    </div>
  </div>

  <!-- Step 4: Results -->
  <div id="step4" class="hidden">
    <div class="section">
      <div class="section-header">
        <h2>检查结果</h2>
        <div class="section-nav">
          <button class="btn btn-outline btn-sm" onclick="exportReport()">&#128190; 导出报告</button>
          <button class="btn btn-outline btn-sm" onclick="goToStep(3)">重新检查</button>
        </div>
      </div>
      <div class="result-summary" id="resultSummary"></div>
      <div id="checkItems"></div>
      <div class="verdict" id="verdict"></div>
    </div>
  </div>

</div>

<script>
// ============================================================
// Config
// ============================================================
var APP_VERSION = '1.3.2';
// v1.0 — 初始版本（四类检查 + Tesseract OCR + DeepSeek纠错）
// v1.1 — 百度云OCR + 本地代理 + Netlify部署 + 逐行对照+忽略
// v1.2 — 匹配度原因分析 + 版本号
// v1.3 — 逐行差异详情 + 疑似OCR误识别词提示
// v1.3.1 — 修复getWordsFn未定义导致第三步无法查看的bug
// v1.3.2 — 修复词高亮与匹配度计算分词不一致导致的误标红

// ============================================================
// Data
// ============================================================
const CATEGORIES = [
  {
    id: 'community', name: '社区通用素材发布', icon: '&#128227;', desc: '社区通用活动/攻略素材检查',
    checks: [

function getBaiduApiKey() { return localStorage.getItem('baidu_api_key') || ''; }
function getBaiduSecretKey() { return localStorage.getItem('baidu_secret_key') || ''; }
var baiduToken = null;
var baiduTokenExpiry = 0;

async function getBaiduAccessToken() {
  if (baiduToken && Date.now() < baiduTokenExpiry) return baiduToken;
  var ak = getBaiduApiKey();
  var sk = getBaiduSecretKey();
  if (!ak || !sk) throw new Error('请填写百度云 API Key 和 Secret Key');

  var base = getBaiduBase();
  var url;
  if (_baiduProxyAvailable) {
    url = base + '/baidu-token?ak=' + encodeURIComponent(ak) + '&sk=' + encodeURIComponent(sk);
  } else {
    url = base + '/oauth/2.0/token?grant_type=client_credentials&client_id=' + encodeURIComponent(ak) + '&client_secret=' + encodeURIComponent(sk);
  }
  var resp = await fetch(url);
  var data = await resp.json();
  if (data.error) throw new Error('百度Token获取失败: ' + (data.error_description || data.error));
  baiduToken = data.access_token;
  baiduTokenExpiry = Date.now() + (data.expires_in - 300) * 1000;
  return baiduToken;
}

// ============================================================
var _isSameOrigin = window.location.protocol !== 'file:';
var _baiduProxyAvailable = _isSameOrigin ? true : null;
var BAIDU_PROXY = 'http://localhost:3456';

async function checkBaiduProxy() {
  if (_isSameOrigin) {
    // Served by our server — same origin, just check the proxy endpoint
    try {
      var resp = await fetch('/ping');
      _baiduProxyAvailable = resp.ok;
    } catch(e) {
      _baiduProxyAvailable = false;
    }
    return _baiduProxyAvailable;
  }
  // File:// mode — check if standalone proxy is running
  try {
    var resp = await fetch(BAIDU_PROXY + '/ping');
    _baiduProxyAvailable = resp.ok;
  } catch(e) {
    _baiduProxyAvailable = false;
  }
  return _baiduProxyAvailable;
}

function getBaiduBase() {
  // Same-origin: server handles everything, use relative paths
  if (_isSameOrigin) return '';
  // File:// with proxy running
  if (_baiduProxyAvailable === true) return BAIDU_PROXY;
  // Direct (will fail with CORS)
  return 'https://aip.baidubce.com';
}

// Baidu OCR language mapping
var BAIDU_LANG_MAP = {
  'rus': 'RUS', 'deu': 'GER', 'fra': 'FRE', 'eng': 'ENG',
  'chi_sim': 'CHN_ENG', 'jpn': 'JAP', 'kor': 'KOR',
  'spa': 'SPA', 'por': 'POR', 'ita': 'ITA'
};

async function baiduOcr(dataUrl, langHint) {
  var token = await getBaiduAccessToken();
  var base64 = dataUrl.split(',')[1];
  var lang = BAIDU_LANG_MAP[langHint] || 'CHN_ENG';

  var formData = new URLSearchParams();
  formData.append('image', base64);
  formData.append('language_type', lang);
  formData.append('detect_direction', 'true');
  formData.append('paragraph', 'true');

  var base = getBaiduBase();
  var url;
  if (_baiduProxyAvailable) {
    url = base + '/baidu-ocr?access_token=' + encodeURIComponent(token);
  } else {
    url = base + '/rest/2.0/ocr/v1/accurate_basic?access_token=' + encodeURIComponent(token);
  }

  var resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: formData.toString()
  });

  var data = await resp.json();
  if (data.error_code) throw new Error('百度OCR错误 ' + data.error_code + ': ' + (data.error_msg || ''));

  // Combine all recognized text blocks
  var words = (data.words_result || []).map(function(w) { return w.words; });
  return words.join('\n');
}

// Tiny 1x1 PNG for vision probe
var TEST_IMG = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';

async function probeAllProviders() {
  var key = getApiKey();
  if (!key) return;

  // Sort: put providers matching key prefix first
  var sorted = PROVIDERS.slice().sort(function(a, b) {
    var aMatch = a.keyHint && key.indexOf(a.keyHint) === 0 ? 0 : 1;
    var bMatch = b.keyHint && key.indexOf(b.keyHint) === 0 ? 0 : 1;
    return aMatch - bMatch;
  });

  var results = [];
  for (var i = 0; i < sorted.length; i++) {
    var p = sorted[i];
    try {
      var body, headers;
      if (p.format === 'openai') {
        headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key };
        body = JSON.stringify({
          model: p.model,
          messages: [{ role: 'user', content: [
            { type: 'image_url', image_url: { url: TEST_IMG } },
            { type: 'text', text: 'say OK' }
          ]}],
          max_tokens: 5, temperature: 0
        });
      } else if (p.format === 'anthropic') {
        headers = { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' };
        body = JSON.stringify({
          model: p.model,
          max_tokens: 5,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/png', data: TEST_IMG.split(',')[1] } },
            { type: 'text', text: 'say OK' }
          ]}]
        });
      }

      var resp = await fetch(p.url, { method: 'POST', headers: headers, body: body });

      if (resp.ok) {
        var data = await resp.json();
        // Check if response actually processed vision (contains 'OK' or similar)
        var content = '';
        if (p.format === 'openai') content = data.choices && data.choices[0] ? data.choices[0].message.content : '';
        else if (p.format === 'anthropic') content = data.content ? data.content[0].text : '';

        var vision = content.length > 0;
        results.push({
          provider: p.name,
          model: p.model,
          url: p.url,
          format: p.format,
          vision: vision,
          detail: vision ? '视觉模型可用' : '返回空（可能不支持图片）'
        });
        if (vision) {
          // Found a working vision model, save config and stop
          localStorage.setItem('ocr_provider', JSON.stringify({
            name: p.name, model: p.model, url: p.url, format: p.format,
            vision: true, detail: p.name + '/' + p.model
          }));
          updateEngineStatus();
          return results;
        }
      } else if (resp.status === 401 || resp.status === 403) {
        results.push({ provider: p.name, detail: 'Key无权限(' + resp.status + ')' });
      } else if (resp.status === 404) {
        results.push({ provider: p.name, detail: '端点/模型不存在(' + resp.status + ')' });
      } else {
        var eb = await resp.text().catch(function(){ return ''; });
        // Check if error mentions image/vision/multimodal support
        if (eb.indexOf('image') >= 0 || eb.indexOf('vision') >= 0 || eb.indexOf('multimodal') >= 0) {
          results.push({ provider: p.name, detail: '不支持图片输入' });
        } else {
          results.push({ provider: p.name, detail: '错误' + resp.status + ': ' + eb.slice(0,60) });
        }
      }
    } catch(err) {
      results.push({ provider: p.name, detail: '网络不通: ' + err.message.slice(0,50) });
    }
  }

  // No vision model found - save as text-only provider using the first working one
  // Let the pipeline use Tesseract + text cleanup
  var firstWorking = results.find(function(r) { return r.detail && r.detail.indexOf('视觉模型可用') >= 0; });
  if (!firstWorking) {
    // Find first provider that responded (even without vision)
    var anyWorking = results.find(function(r) { return r.provider && !r.detail; });
    if (anyWorking) {
      var origProvider = PROVIDERS.find(function(p) { return p.name === anyWorking.provider; });
      localStorage.setItem('ocr_provider', JSON.stringify({
        name: origProvider.name, model: origProvider.model, url: origProvider.url, format: origProvider.format,
        vision: false, detail: origProvider.name + ' (文本)'
      }));
    } else {
      // Any provider that at least responded
      var fallback = results.find(function(r) { return r.provider; });
      if (fallback) {
        var fp = PROVIDERS.find(function(p) { return p.name === fallback.provider; });
        localStorage.setItem('ocr_provider', JSON.stringify({
          name: fp ? fp.name : fallback.provider, model: fp ? fp.model : '', url: fp ? fp.url : '', format: fp ? fp.format : 'openai',
          vision: false, detail: '文本模式'
        }));
      }
    }
  }

  // Store results for debug display
  window._probeResults = results;
  updateEngineStatus();
  return results;
}

  }

  updateEngineStatus();
}

async function textCleanupViaProvider(rawOcrText, langHint, filename, provCfg) {
  var apiKey = getApiKey();
  if (!apiKey) throw new Error('未配置API Key');

  var langMap = {
    'rus': 'Russian', 'deu': 'German', 'fra': 'French',
    'eng': 'English', 'chi_sim': 'Chinese', 'jpn': 'Japanese', 'kor': 'Korean'
  };
  var langName = langMap[langHint] || '';

  var prompt = 'Below is raw OCR output from an image. The OCR may contain garbled characters, ' +
    'misrecognized letters (especially for Cyrillic/non-Latin scripts), and formatting errors.\n\n' +
    'Your task: reconstruct the ORIGINAL text that was in the image. ' +
    'Fix misrecognized characters, restore correct words, and preserve the original language and formatting.\n\n' +
    'Rules:\n' +
    '- Output ONLY the corrected text, nothing else.\n' +
    '- Preserve line breaks and structure.\n' +
    '- Do NOT translate or summarize.\n' +
    '- If a word is clearly garbled beyond recognition, leave it as-is rather than guessing.\n' +
    '- Pay special attention to: dates, numbers, codes (like CDK), names, and proper nouns.\n' +
    (langName ? '- The original text is in ' + langName + '. Fix characters to match this language.\n' : '') +
    (filename ? '- Filename: ' + filename + ' (may hint at content/language)\n' : '') +
    '\nRaw OCR text:\n---\n' + rawOcrText + '\n---';

  var resp = await fetch(provCfg.url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({
      model: provCfg.model,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 4096, temperature: 0.1,
    }),
  });

  if (!resp.ok) {
    var errBody = await resp.text().catch(function(){ return ''; });
    throw new Error(provCfg.name + ' 返回 ' + resp.status + ': ' + errBody.slice(0, 200));
  }

  var data = await resp.json();
  return { text: data.choices[0].message.content.trim(), model: provCfg.model };
}

  document.getElementById('uploadZone').addEventListener('click', function(e) {
    document.getElementById('fileInput').click();
  });

  // File input change
  document.getElementById('fileInput').addEventListener('change', function(e) {
    handleFiles(e.target.files);
  });

  // Drag and drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });

    handleFiles(e.dataTransfer.files);
  });
}

// Helpers
// ============================================================
function extractLang(filename) {
  const upper = filename.toUpperCase();
  for (const code of LANG_CODES) {
    if (new RegExp(`[_\\.\\-]${code}[_\\.\\-]`,'i').test(upper)) return code;
    if (new RegExp(`[_\\.\\-]${code}$`,'i').test(upper)) return code;
    if (new RegExp(`^${code}[_\\.\\-]`,'i').test(upper)) return code;
    if (upper.includes(`(${code})`) || upper.includes(`[${code}]`)) return code;
  }
  return null;
}

function extractDates(text) {
  if (!text) return [];
  // Normalize: collapse spaces around dashes in date ranges like "10.05 - 29.05"
  var norm = text.replace(/\s*[-–—]\s*/g, '-');
  var pats = [
    // Year-first: 2024/01/15, 2024-01-15, 2024.01.15
    /\d{4}[\/\-\.]\d{1,2}[\/\-\.]\d{1,2}/g,
    // Year-last: 15/01/2024
    /\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{4}/g,
    // Chinese: 2024年1月15日
    /\d{4}年\d{1,2}月\d{1,2}日/g,
    // Chinese short: 1月15日
    /\d{1,2}月\d{1,2}日/g,
    // Dots with year: 15.01.2024
    /\d{1,2}\.\d{1,2}\.\d{4}/g,
    // DD.MM without year: 10.05, 29.05
    /\d{1,2}\.\d{1,2}/g,
    // DD.MM-DD.MM range without year: 10.05-29.05
    /\d{1,2}\.\d{1,2}\s*-\s*\d{1,2}\.\d{1,2}/g,
    // DD/MM without year: 10/05
    /\d{1,2}\/\d{1,2}/g,
    // English: Jan 15, 2024
    /(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2},?\s+\d{4}/gi,
    // English: 15 Jan 2024
    /\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{4}/gi,
    // Russian: 10 мая 2026
    /\d{1,2}\s+(?:янв|фев|мар|апр|ма[яй]|июн|июл|авг|сен|окт|ноя|дек)[а-я]*\s+\d{4}/gi,
  ];
  var all = [];
  for (var i = 0; i < pats.length; i++) {
    var matches = norm.match(pats[i]) || [];
    all.push.apply(all, matches);
  }
  // Also match date ranges with spaces: "10.05 - 29.05"
  var rangeMatch = norm.match(/\d{1,2}\.\d{1,2}\s*[-–—]\s*\d{1,2}\.\d{1,2}/g);
  if (rangeMatch) all.push.apply(all, rangeMatch);
  return [...new Set(all.map(function(d) { return d.replace(/\s+/g, ' ').trim(); }))];
}

function extractCDKs(text) {
  if (!text) return [];
  // Normalize Cyrillic lookalikes to Latin for CDK detection
  // OCR often returns Cyrillic chars that visually match Latin letters
  var cyr2lat = {
    'А': 'A', 'В': 'B', 'Е': 'E', 'К': 'K', 'М': 'M',
    'Н': 'H', 'О': 'O', 'Р': 'P', 'С': 'C', 'Т': 'T',
    'У': 'Y', 'Х': 'X', 'а': 'A', 'е': 'E', 'о': 'O',
    'р': 'P', 'с': 'C', 'у': 'Y', 'х': 'X', 'к': 'K',
    'н': 'H', 'м': 'M', 'в': 'B', 'т': 'T'
  };
  var normText = text;
  for (var k in cyr2lat) {
    if (!cyr2lat.hasOwnProperty(k)) continue;
    normText = normText.replace(new RegExp(k, 'g'), cyr2lat[k]);
  }
  var results = [];
  // Hyphenated codes: ABCD-1234-EFGH or WHOWILLSAVET-YA53 (when OCR adds hyphens)
  var p1 = normText.match(/[A-Z0-9]{4,}-[A-Z0-9]{4,}(-[A-Z0-9]{4,})?/gi) || [];
  // Continuous codes 8+ chars: WHOWILLSAVETYA53
  var p2 = normText.match(/[A-Z0-9]{8,}/g) || [];
  results.push.apply(results, p1);
  results.push.apply(results, p2);
  // Also try to find CDK-like patterns near keywords like "код", "code", "CDK", "CDKey"
  var cdkBlock = text.match(/(?:код|code|CDK|CDKey|兑换码|礼品码)[:\s]*([A-Za-zА-Яа-я0-9\-]{6,})/gi);
  if (cdkBlock) {
    for (var i = 0; i < cdkBlock.length; i++) {
      var m = cdkBlock[i].match(/[A-Za-zА-Яа-я0-9\-]{6,}$/i);
      if (m) {
        var code = m[0];
        for (var k2 in cyr2lat) {
          if (!cyr2lat.hasOwnProperty(k2)) continue;
          code = code.replace(new RegExp(k2, 'g'), cyr2lat[k2]);
        }
        results.push(code);
      }
    }
  }
  // Deduplicate and filter
  var seen = {};
  return results.filter(function(c) {
    var upper = c.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (upper.length < 6 || upper.length > 30) return false;
    if (seen[upper]) return false;
    seen[upper] = true;
    return true;
  });
}

function calcSimilarity(t1, t2) {
  if (!t1 || !t2) return 0;
  const norm = t => t.toLowerCase().replace(/[^\w\s一-鿿]/g,' ').replace(/\s+/g,' ').trim();
  const a = norm(t1), b = norm(t2);
  if (!a || !b) return 0;
  const wa = new Set(a.split(' ').filter(w => w.length > 1));
  const wb = new Set(b.split(' ').filter(w => w.length > 1));
  if (wa.size === 0 || wb.size === 0) return 0;
  const inter = new Set([...wa].filter(w => wb.has(w)));
  return inter.size / new Set([...wa, ...wb]).size;
}

function findPhrases(text, phrases) {
  if (!text || !phrases.length) return { found:[], missing:phrases };
  const lower = text.toLowerCase();
  const found = [], missing = [];
  for (const p of phrases) found.push(lower.includes(p.toLowerCase()) ? p : missing.push(p) && null);
  return { found: phrases.filter(p => lower.includes(p.toLowerCase())), missing: phrases.filter(p => !lower.includes(p.toLowerCase())) };
}

function normDate(d) { return d.replace(/[年月]/g,'-').replace(/[日号]/g,'').replace(/\./g,'-').trim(); }

function extractHeroKeywords(text) {
  if (!text) return [];
  const kws = [];
  const pats = [/(?:英雄|角色|Hero|Champion)[:：\s]*([A-Za-z一-鿿]+)/gi, /(?:神器|Artifact|Relic)[:：\s]*([A-Za-z一-鿿]+)/gi, /(?:关卡|Stage|Level)[:：\s]*([A-Za-z0-9一-鿿\-]+)/gi];
  for (const p of pats) { let m; while ((m = p.exec(text)) !== null) kws.push(m[1].trim()); }
  if (kws.length === 0) {
    const words = text.match(/[A-Z][a-z]{2,}|[一-鿿]{2,4}/g) || [];
    return [...new Set(words)].slice(0, 10);
  }
  return [...new Set(kws)];
}

function updateStepUI() {
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('stepDot'+i);
    const stepDiv = document.getElementById('step'+i);
    dot.className = 'step-dot';
    if (i < state.step) dot.classList.add('done');
    if (i === state.step) dot.classList.add('active');
    if (stepDiv) stepDiv.classList.toggle('hidden', i !== state.step);
  }
  for (let i = 1; i <= 3; i++) {
    const line = document.getElementById('stepLine'+i);
    if (line) line.className = 'step-line' + (i < state.step ? ' done' : '');
  }
  const labels = ['选择类别','上传素材','输入需求','查看结果'];
  document.getElementById('stepLabel').textContent = labels[state.step-1];
  document.getElementById('btnReset').classList.toggle('hidden', state.step === 1);
}

function goToStep(n) {
  state.step = n;
  updateStepUI();
  if (n === 3) renderImageSummaryInStep3();
}

  state = { step:1, categoryId:null, images:[], reqText:'', checkResults:null, ocrLoading:{}, ignoredOcrLines:{}, ignoredReqLines:{} };

  document.getElementById('reqText').value = '';

function handleFiles(fileList) {
  const files = Array.from(fileList);
  if (files.length === 0) return;

  const statusEl = document.getElementById('uploadStatus');
  statusEl.className = 'upload-status show success';
  statusEl.textContent = '已选择 ' + files.length + ' 个文件，正在处理...';

  const newImages = [];
  let processed = 0;
  const total = files.length;

  files.forEach((file, fi) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      newImages.push({
        file: file,
        name: file.name,
        preview: e.target.result,
        lang: extractLang(file.name),
        ocrText: '',
        ocrLang: TESSERACT_LANG_MAP[extractLang(file.name)] || 'eng+chi_sim',
        ocrEngine: '',
        ocrPlan: ''
      });
      processed++;
      if (processed === total) {
        state.images = [...state.images, ...newImages];
        statusEl.textContent = '成功上传 ' + state.images.length + ' 张图片！';
        renderImageList();
        // Clear file input so same file can be re-selected
        document.getElementById('fileInput').value = '';
      }
    };
    reader.onerror = function() {
      processed++;
      statusEl.className = 'upload-status show error';
      statusEl.textContent = '文件读取失败：' + file.name;
    };
    reader.readAsDataURL(file);
  });
}

function renderUploadStatus() {
  const statusEl = document.getElementById('uploadStatus');
  if (state.images.length === 0) {
    statusEl.className = 'upload-status';
    statusEl.textContent = '';
  } else {
    statusEl.className = 'upload-status show success';
    statusEl.textContent = '已上传 ' + state.images.length + ' 张图片';
  }
}

      <button class="btn btn-ocr btn-sm" onclick="runAllOcr()" ${isAnyLoading ? 'disabled' : ''}>

              ${OCR_LANG_OPTIONS.map(o => '<option value="'+o.code+'"' + (img.ocrLang === o.code ? ' selected' : '') + '>'+o.label+'</option>').join('')}

          </div>

            id="ocrText${i}"
            placeholder="${img.ocrText ? '' : '点击下方「识别文字」自动提取，也可手动粘贴...'}"

                ${state.ocrLoading[i] ? '<span class="spinner"></span>' : '&#9729;'} 百度OCR识别

                ${state.ocrLoading[i] ? '<span class="spinner"></span>' : '&#129302;'} AI 识别
              </button>
              <button class="btn btn-sm btn-ocr" onclick="runTesseractOcr(${i})">&#128269; Tesseract</button>
            ` : `
              <button class="btn btn-ocr btn-sm" id="ocrBtn${i}" onclick="runTesseractOcr(${i})" ${state.ocrLoading[i] ? 'disabled' : ''}>
                ${state.ocrLoading[i] ? '<span class="spinner"></span>' : '&#128269;'} Tesseract 识别
              </button>
            `}
            <button class="btn btn-danger btn-sm" onclick="removeImage(${i})">&#10005; 删除</button>
          </div>
        </div>
      </div>
    `).join('')}
  `;
}

function updateOcrText(index, text) {
  if (state.images[index]) state.images[index].ocrText = text;
}

function removeImage(index) {
  state.images.splice(index, 1);
  delete state.ocrLoading[index];
  // Re-index ocrLoading
  const newLoading = {};
  Object.keys(state.ocrLoading).forEach(k => {
    const ki = parseInt(k);
    if (ki > index) newLoading[ki-1] = state.ocrLoading[ki];
    else if (ki < index) newLoading[ki] = state.ocrLoading[ki];
  });
  state.ocrLoading = newLoading;
  document.getElementById('fileInput').value = '';
  renderImageList();
  renderUploadStatus();
}

// Preprocess image: draw to canvas, convert to grayscale, enhance contrast
function preprocessImage(dataUrl) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      var ctx = canvas.getContext('2d');
      // Draw original
      ctx.drawImage(img, 0, 0);
      // Get image data
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var data = imageData.data;
      // Convert to grayscale and increase contrast
      for (var i = 0; i < data.length; i += 4) {
        // Grayscale: weighted average
        var gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        // Contrast enhancement - stretch the range
        gray = ((gray - 128) * 1.8) + 128;
        // Clamp
        gray = Math.max(0, Math.min(255, gray));
        data[i] = gray;     // R
        data[i + 1] = gray; // G
        data[i + 2] = gray; // B
        // Alpha stays the same
      }
      ctx.putImageData(imageData, 0, 0);
      resolve(canvas);
    };
    img.onerror = function() { reject(new Error('Image load failed')); };
    img.src = dataUrl;
  });
}

// Cache workers by language to avoid re-downloading language data
var ocrWorkers = {};

async function getWorker(lang) {
  if (ocrWorkers[lang]) return ocrWorkers[lang];
  var worker = await Tesseract.createWorker(lang, 1, {
    langPath: 'https://tessdata.projectnaptha.com/4.0.0',
    corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.0.0',
  });
  ocrWorkers[lang] = worker;
  return worker;
}

async function runOcr(index) {
  var img = state.images[index];
  if (!img) return;

  // Read the current language selection from DOM
  var langSel = document.getElementById('ocrLang'+index);
  if (langSel) state.images[index].ocrLang = langSel.value;
  var ocrLang = state.images[index].ocrLang || 'eng+chi_sim';

  state.ocrLoading[index] = true;
  renderImageList();

  var text = '';
  var engine = '';

  // ---- Pipeline ----
  var rawText = '';
  var plan = '';

  if (getProviderType() === 'baidu') {
    try {
      text = await baiduOcr(img.preview, ocrLang);
      engine = '百度云OCR';
      plan = 'accurate_basic';
    } catch (err) {
      console.error('百度OCR failed:', err.message);
      state.images[index].ocrText = '[百度OCR识别失败]\n错误: ' + (err.message || 'Unknown') + '\n\n请点击「Tesseract」按钮获取本地结果，或手动粘贴。';
      state.images[index].ocrEngine = '失败';
      state.images[index].ocrPlan = '';
      state.ocrLoading[index] = false;
      renderImageList();
      var taErrB = document.getElementById('ocrText'+index);
      if (taErrB) taErrB.value = state.images[index].ocrText || '';
      return;
    }
  } else {
    var apiKey = getApiKey();
    var provCfg = getProviderConfig();
    if (apiKey && provCfg) {
      try {
      // Plan A: Provider has vision → send image directly
      if (provCfg.vision) {
        var langMap = { 'rus': '俄语', 'deu': '德语', 'fra': '法语', 'eng': '英语', 'chi_sim': '中文' };
        var langName = langMap[ocrLang] || '';
        var visionPrompt = 'Extract ALL text from this image exactly as it appears. Preserve original language, formatting, line breaks. Output ONLY the extracted text, nothing else.' + (langName ? ' Language: ' + langName + '.' : '');

        if (provCfg.format === 'anthropic') {
          var base64data = img.preview.split(',')[1];
          var antResp = await fetch(provCfg.url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
            body: JSON.stringify({
              model: provCfg.model,
              max_tokens: 4096,
              messages: [{ role: 'user', content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/png', data: base64data } },
                { type: 'text', text: visionPrompt }
              ]}]
            }),
          });
          if (!antResp.ok) throw new Error('Anthropic 返回 ' + antResp.status);
          var antData = await antResp.json();
          text = antData.content[0].text.trim();
        } else {
          // OpenAI-compatible format
          var visResp = await fetch(provCfg.url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({
              model: provCfg.model,
              messages: [{ role: 'user', content: [
                { type: 'image_url', image_url: { url: img.preview } },
                { type: 'text', text: visionPrompt }
              ]}],
              max_tokens: 4096, temperature: 0,
            }),
          });
          if (!visResp.ok) {
            var ve = await visResp.text().catch(function(){ return ''; });
            throw new Error(provCfg.name + ' 返回 ' + visResp.status + ': ' + ve.slice(0, 100));
          }
          var visData = await visResp.json();
          text = visData.choices[0].message.content.trim();
        }
        engine = provCfg.name;
        plan = provCfg.model;
      }

      // Plan B: No vision → Tesseract + text cleanup via provider's text model
      if (!text) {
        if (typeof Tesseract === 'undefined') throw new Error('Tesseract.js 未加载');
        var processedCanvas = await preprocessImage(img.preview);
        var worker = await getWorker(ocrLang);
        var tesseractResult = await worker.recognize(processedCanvas);
        rawText = tesseractResult.data.text || '';
        if (!rawText.trim()) throw new Error('Tesseract 未提取到文字');

        var cleanupResult = await textCleanupViaProvider(rawText, ocrLang, img.name, provCfg);
        text = cleanupResult.text;
        engine = provCfg.name;
        plan = 'Tesseract→' + provCfg.model;
      }
    } catch (err) {
      console.error('OCR pipeline failed:', err.message);
      state.images[index].ocrText = '[识别失败]\n' +
        (provCfg.vision ? '视觉直调: ' + provCfg.name + '/' + provCfg.model + '\n' : '') +
        'Tesseract原始: ' + (rawText ? rawText.slice(0, 300) : '(无)') + '\n' +
        '错误: ' + (err.message || 'Unknown') + '\n\n' +
        '请点击「Tesseract」按钮获取纯本地结果，或手动粘贴。';
      state.images[index].ocrEngine = '失败';
      state.ocrLoading[index] = false;
      renderImageList();
      var taErr = document.getElementById('ocrText'+index);
      if (taErr) taErr.value = state.images[index].ocrText || '';
      return;
    }
  }
  }

  // If we get here without text, show message
  if (!text) {
    state.images[index].ocrText = '[未识别]\n请点击识别按钮提取文字。';
    state.images[index].ocrEngine = '';
    state.images[index].ocrPlan = '';
  } else {
    state.images[index].ocrText = text;
    state.images[index].ocrEngine = engine;
    state.images[index].ocrPlan = plan || engine;
  }

  state.ocrLoading[index] = false;
  renderImageList();
  var ta = document.getElementById('ocrText'+index);
  if (ta) ta.value = state.images[index].ocrText || '';
}

// Direct Tesseract OCR (bypasses DeepSeek)
async function runTesseractOcr(index) {
  var img = state.images[index];
  if (!img) return;

  if (typeof Tesseract === 'undefined') {
    alert('Tesseract.js 尚未加载完成，请稍后再试。或使用 DeepSeek 识别。');
    return;
  }

  var langSel = document.getElementById('ocrLang'+index);
  if (langSel) state.images[index].ocrLang = langSel.value;
  var ocrLang = state.images[index].ocrLang || 'eng+chi_sim';

  state.ocrLoading[index] = true;
  renderImageList();

  try {
    var processedCanvas = await preprocessImage(img.preview);
    var worker = await getWorker(ocrLang);
    var result = await worker.recognize(processedCanvas);
    var text = result.data.text || '';
    var alphaChars = (text.match(/[a-zA-Zа-яА-ЯёЁ一-鿿0-9]/g) || []).length;
    var totalChars = text.replace(/\s/g, '').length;
    if (totalChars > 20 && alphaChars / totalChars < 0.3) {
      text = '[Tesseract识别质量不佳]\n' + text;
    }
    state.images[index].ocrText = text;
    state.images[index].ocrEngine = 'Tesseract';
  } catch (err) {
    state.images[index].ocrText = '[Tesseract失败: ' + (err.message || 'Unknown') + ']';
    state.images[index].ocrEngine = 'Tesseract失败';
  }

  state.ocrLoading[index] = false;
  renderImageList();
  var ta = document.getElementById('ocrText'+index);
  if (ta) ta.value = state.images[index].ocrText || '';
}

async function runAllOcr() {
  var isBaiduReady = getProviderType() === 'baidu' && getBaiduApiKey() && getBaiduSecretKey();
  var isGenericReady = getApiKey() && getProviderConfig();
  if (typeof Tesseract === 'undefined' && !isBaiduReady && !isGenericReady) {
    alert('请先在顶栏配置百度云API密钥并点击「连接测试」，或输入 AI API Key 完成配置，或等待 Tesseract.js 加载完成后使用。');
    return;
  }
  for (var i = 0; i < state.images.length; i++) {
    if (!state.images[i].ocrText || state.images[i].ocrText.indexOf('OCR') === 0 || state.images[i].ocrText.indexOf('识别失败') === 0 || state.images[i].ocrText.indexOf('识别质量') >= 0 || state.images[i].ocrText.indexOf('需配置') >= 0) {
      await runOcr(i);
    }
  }
}

function renderDiffView() {
  // Collect OCR lines from all images (no filename headers)
  var ocrLines = [];
  for (var i = 0; i < state.images.length; i++) {
    var img = state.images[i];
    if (img.ocrText) {
      var imgLines = img.ocrText.split('\n').filter(function(l) { return l.trim(); });
      for (var j = 0; j < imgLines.length; j++) {
        ocrLines.push({ text: imgLines[j], imgIdx: i, lineIdx: j, key: i + '_' + j });
      }
    }
  }

  var reqText = document.getElementById('reqText').value;
  state.reqText = reqText;
  var rawReqLines = reqText.split('\n').filter(function(l) { return l.trim(); });
  var reqLines = [];
  for (var k = 0; k < rawReqLines.length; k++) {
    reqLines.push({ text: rawReqLines[k], lineIdx: k, key: 'r_' + k });
  }

  // Cyrillic-lookalike normalization for accurate word comparison
  function normalizeCyrillic(s) {
    var map = {
      'А':'A','В':'B','Е':'E','К':'K','М':'M',
      'Н':'H','О':'O','Р':'P','С':'C','Т':'T',
      'У':'Y','Х':'X','а':'a','в':'b','е':'e',
      'к':'k','м':'m','н':'h','о':'o','р':'p',
      'с':'c','т':'t','у':'y','х':'x','і':'i',
      'І':'I','Ј':'J','ј':'j'
    };
    return s.replace(/[А-ј]/g, function(ch) { return map[ch] || ch; });
  }

  // Word-level similarity helper
  function wordSim(a, b) {
    var getWords = function(t) {
      var norm = normalizeCyrillic(t);
      var cleaned = norm.toLowerCase().replace(/[^\wЀ-ӿ一-鿿0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
      var wrds = cleaned.split(' ').filter(function(w) { return w.length >= 2; });
      return new Set(wrds);
    };
    var wa = getWords(a), wb = getWords(b);
    if (wa.size === 0 || wb.size === 0) return 0;
    var inter = 0;
    wa.forEach(function(w) { if (wb.has(w)) inter++; });
    return inter / Math.max(wa.size, wb.size);
  }


  // Word extraction helper (used for both pairing and highlighting)
  var getWordsFn = function(text) {
    var norm = normalizeCyrillic(text);
    var cleaned = norm.toLowerCase().replace(/[^\wЀ-ӿ一-鿿0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
    return new Set(cleaned.split(' ').filter(function(w) { return w.length >= 2; }));
  };

  // Greedy pair OCR lines with req lines
  var pairs = [];
  var usedReq = {};
  for (var oi = 0; oi < ocrLines.length; oi++) {
    var bestJ = -1, bestSim = 0.25; // threshold
    for (var ri = 0; ri < reqLines.length; ri++) {
      if (usedReq[ri]) continue;
      var sim = wordSim(ocrLines[oi].text, reqLines[ri].text);
      if (sim > bestSim) { bestSim = sim; bestJ = ri; }
    }
    if (bestJ >= 0) {
      usedReq[bestJ] = true;
      pairs.push({ ocr: ocrLines[oi], req: reqLines[bestJ], matchRate: Math.round(bestSim * 100) });
    } else {
      pairs.push({ ocr: ocrLines[oi], req: null, matchRate: 0 });
    }
  }
  // Unmatched req lines
  for (var ri2 = 0; ri2 < reqLines.length; ri2++) {
    if (!usedReq[ri2]) {
      pairs.push({ ocr: null, req: reqLines[ri2], matchRate: 0 });
    }
  }

  // Build table rows
  var body = document.getElementById('diffTableBody');
  var html = '';
  var totalMatched = 0, totalLines = pairs.length;
  var activeCount = 0, matchSum = 0;

  for (var pi = 0; pi < pairs.length; pi++) {
    var p = pairs[pi];
    var ocrKey = p.ocr ? p.ocr.key : '';
    var reqKey = p.req ? p.req.key : '';

    var ocrIgnored = state.ignoredOcrLines[ocrKey];
    var reqIgnored = state.ignoredReqLines[reqKey];
    var rowIgnored = ocrIgnored || reqIgnored;

    // Determine row class
    var rowClass, badgeText;
    if (p.ocr && p.req && p.matchRate >= 40) {
      rowClass = 'match'; badgeText = '匹配 ' + p.matchRate + '%';
    } else if (p.ocr && p.req) {
      rowClass = 'partial'; badgeText = '部分 ' + p.matchRate + '%';
    } else if (p.ocr && !p.req) {
      rowClass = 'extra'; badgeText = 'OCR多出';
    } else {
      rowClass = 'missing'; badgeText = '需求多出';
    }

    if (!rowIgnored) {
      activeCount++;
      if (p.ocr && p.req) matchSum += p.matchRate;
    }

    html += '<div class="diff-row ' + rowClass + (rowIgnored ? ' ignored' : '') + '">';

    // Build word sets for inline highlighting (only for partial rows)
    var ocrWordSet = null, reqWordSet = null, nearMissWordMap = null;
    if (p.ocr && p.req) {
      ocrWordSet = getWordsFn(p.ocr.text);
      reqWordSet = getWordsFn(p.req.text);
      // Find near-misses within this pair
      nearMissWordMap = {};
      var oArr = [], rArr = [];
      ocrWordSet.forEach(function(w) { if (!reqWordSet.has(w)) oArr.push(w); });
      reqWordSet.forEach(function(w) { if (!ocrWordSet.has(w)) rArr.push(w); });
      for (var nai = 0; nai < rArr.length; nai++) {
        var rw = rArr[nai];
        if (rw.length < 3) continue;
        for (var naj = 0; naj < oArr.length; naj++) {
          var ow = oArr[naj];
          if (Math.abs(rw.length - ow.length) > 2) continue;
          var minL = Math.min(rw.length, ow.length), maxL = Math.max(rw.length, ow.length);
          var d = maxL - minL;
          for (var nk = 0; nk < minL; nk++) { if (rw[nk] !== ow[nk]) d++; if (d > 2) break; }
          if (d <= 2 && d > 0) { nearMissWordMap[rw] = ow; nearMissWordMap[ow] = rw; break; }
        }
      }
    }

    // Helper: render text with word highlighting
    function renderHighlighted(text, ownWordSet, otherWordSet, nearMap, cellClass) {
      if (!text) return '<span class="diff-cell-empty">—</span>';
      if (!ownWordSet || !otherWordSet) return escHtml(text);
      var tokens = text.match(/([\wЀ-ӿ一-鿿0-9\.\/\-:]+|[^\wЀ-ӿ一-鿿0-9\.\/\-:]+)/g) || [text];
      var out = '';
      for (var ti = 0; ti < tokens.length; ti++) {
        var tok = tokens[ti];
        if (/^[\wЀ-ӿ一-鿿0-9\.\/\-:]+$/.test(tok)) {
          // Apply the SAME normalization as getWordsFn to extract sub-words
          var norm = normalizeCyrillic(tok);
          var cleaned = norm.toLowerCase().replace(/[^\wЀ-ӿ一-鿿0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
          var subWords = cleaned.split(' ').filter(function(w) { return w.length >= 2; });

          if (subWords.length === 0) {
            out += escHtml(tok);
            continue;
          }

          // Check if ALL sub-words exist in the other set
          var allMatch = true;
          for (var swi = 0; swi < subWords.length; swi++) {
            if (!otherWordSet.has(subWords[swi])) {
              allMatch = false;
              break;
            }
          }

          if (allMatch) {
            out += escHtml(tok);
          } else {
            // Some sub-words don't match
            if (nearMap && subWords.length === 1 && nearMap[subWords[0]]) {
              out += '<span class="w-near" title="疑似误识别：' + escHtml(nearMap[subWords[0]]) + '">' + escHtml(tok) + '</span>';
            } else {
              var cls = cellClass === 'ocr' ? 'w-extra' : 'w-miss';
              out += '<span class="' + cls + '">' + escHtml(tok) + '</span>';
            }
          }
        } else {
          out += escHtml(tok);
        }
      }
      return out;
    }

    // OCR cell
    html += '<div class="diff-cell-ocr">';
    if (p.ocr) {
      if (p.req) {
        html += renderHighlighted(p.ocr.text, ocrWordSet, reqWordSet, nearMissWordMap, 'ocr');
      } else {
        html += escHtml(p.ocr.text);
      }
    } else {
      html += '<span class="diff-cell-empty">—</span>';
    }
    html += '</div>';

    // Status cell with ignore toggle
    html += '<div class="diff-cell-status">';
    html += '<span class="diff-badge">' + badgeText + '</span>';
    if (p.ocr) {
      html += '<button class="diff-ignore-btn" onclick="toggleIgnoreLine(\'' + ocrKey + '\',\'ocr\')" title="忽略此行">' + (ocrIgnored ? '取消' : '忽略') + '</button>';
    }
    if (p.req) {
      html += '<button class="diff-ignore-btn" onclick="toggleIgnoreLine(\'' + reqKey + '\',\'req\')" title="忽略此行" style="margin-top:2px;">' + (reqIgnored ? '取消' : '忽略') + '</button>';
    }
    html += '</div>';

    // Req cell
    html += '<div class="diff-cell-req">';
    if (p.req) {
      if (p.ocr) {
        html += renderHighlighted(p.req.text, reqWordSet, ocrWordSet, nearMissWordMap, 'req');
      } else {
        html += escHtml(p.req.text);
      }
    } else {
      html += '<span class="diff-cell-empty">—</span>';
    }
    html += '</div>';

    html += '</div>';
  }

  body.innerHTML = html || '<div class="diff-empty">请先识别图片文字，然后输入需求文本</div>';

  // Update match bar
  var avgMatch = activeCount > 0 ? Math.round(matchSum / activeCount) : 0;
  var barFill = document.getElementById('diffMatchBarFill');
  if (avgMatch >= 70) barFill.style.background = '#16a34a';
  else if (avgMatch >= 40) barFill.style.background = '#d97706';
  else barFill.style.background = '#dc2626';
  barFill.style.width = (avgMatch || 1) + '%';

  // Update stats
  var ignoredCount = Object.keys(state.ignoredOcrLines).length + Object.keys(state.ignoredReqLines).length;
  document.getElementById('diffIgnoredCount').textContent = ignoredCount;
  var hint = document.getElementById('diffRefreshHint');
  hint.textContent = '平均匹配 ' + avgMatch + '% | ' + activeCount + ' 活跃行 | 编辑后自动刷新';

  // ---- Generate match reasons ----
  var reasonsEl = document.getElementById('diffReasons');
  var reasonsHtml = '<strong>&#128270; 匹配度分析</strong>';
  var items = [];

  // Build word sets from non-ignored lines only
  var activeOcrText = '', activeReqText = '';
  for (var ai = 0; ai < pairs.length; ai++) {
    var ap = pairs[ai];
    var aiOcrKey = ap.ocr ? ap.ocr.key : '';
    var aiReqKey = ap.req ? ap.req.key : '';
    if (!state.ignoredOcrLines[aiOcrKey] && !state.ignoredReqLines[aiReqKey]) {
      if (ap.ocr) activeOcrText += ap.ocr.text + '\n';
      if (ap.req) activeReqText += ap.req.text + '\n';
    }
  }

  // Count matched/extra/missing lines
  var matchedLines = 0, partialLines = 0, extraLines = 0, missingLines = 0;
  for (var bi = 0; bi < pairs.length; bi++) {
    var bp = pairs[bi];
    var biOcrKey = bp.ocr ? bp.ocr.key : '';
    var biReqKey = bp.req ? bp.req.key : '';
    if (state.ignoredOcrLines[biOcrKey] || state.ignoredReqLines[biReqKey]) continue;
    if (bp.ocr && bp.req && bp.matchRate >= 40) matchedLines++;
    else if (bp.ocr && bp.req) partialLines++;
    else if (bp.ocr && !bp.req) extraLines++;
    else missingLines++;
  }
  items.push({ dot: matchedLines > 0 ? 'ok' : 'warn', text: '完整匹配 <b>' + matchedLines + '</b> 行' });
  if (partialLines > 0) items.push({ dot: 'warn', text: '部分匹配 <b>' + partialLines + '</b> 行（OCR内容与需求不完全一致）' });
  if (extraLines > 0) items.push({ dot: 'fail', text: 'OCR多出 <b>' + extraLines + '</b> 行（OCR识别出了需求中没有的内容）' });
  if (missingLines > 0) items.push({ dot: 'fail', text: '需求缺失 <b>' + missingLines + '</b> 行（需求中的内容OCR未识别到）' });

  // Check dates
  var ocrDates = extractDates(activeOcrText);
  var reqDates = extractDates(activeReqText);
  if (reqDates.length > 0 && ocrDates.length > 0) {
    var dateMatch = reqDates.some(function(rd) {
      return ocrDates.some(function(od) { return od.replace(/\s+/g,' ').indexOf(rd.replace(/\s+/g,' ')) >= 0 || rd.replace(/\s+/g,' ').indexOf(od.replace(/\s+/g,' ')) >= 0; });
    });
    if (dateMatch) items.push({ dot: 'ok', text: '日期信息已匹配' });
    else items.push({ dot: 'fail', text: '日期不一致：OCR识别 <b>' + (ocrDates.join(', ') || '无') + '</b>，需求中 <b>' + (reqDates.join(', ') || '无') + '</b>' });
  } else if (reqDates.length > 0) {
    items.push({ dot: 'fail', text: '需求中有日期但OCR未识别到：<b>' + reqDates.join(', ') + '</b>' });
  } else if (ocrDates.length > 0) {
    items.push({ dot: 'warn', text: 'OCR识别到日期但需求中未标明：<b>' + ocrDates.join(', ') + '</b>' });
  }

  // Check CDKs
  var ocrCDKs = extractCDKs(activeOcrText);
  var reqCDKs = extractCDKs(activeReqText);
  if (reqCDKs.length > 0 && ocrCDKs.length > 0) {
    var cdkAllMatch = reqCDKs.every(function(rc) {
      return ocrCDKs.some(function(oc) { return oc.toUpperCase() === rc.toUpperCase(); });
    });
    if (cdkAllMatch) items.push({ dot: 'ok', text: 'CDK码已全部匹配' });
    else items.push({ dot: 'fail', text: 'CDK码差异：OCR <b>' + ocrCDKs.join(', ') + '</b>，需求 <b>' + reqCDKs.join(', ') + '</b>' });
  } else if (reqCDKs.length > 0) {
    items.push({ dot: 'fail', text: '需求中有CDK但OCR未识别到：<b>' + reqCDKs.join(', ') + '</b>' });
  } else if (ocrCDKs.length > 0) {
    items.push({ dot: 'warn', text: 'OCR识别到CDK但需求中未标明：<b>' + ocrCDKs.join(', ') + '</b>' });
  }

  // Word-level stats
  var ow = getWordsFn(activeOcrText), rw = getWordsFn(activeReqText);

  // --- Per-partial-match line details ---
  var partialDetails = [];
  for (var di = 0; di < pairs.length; di++) {
    var dp = pairs[di];
    var diOcrKey = dp.ocr ? dp.ocr.key : '';
    var diReqKey = dp.req ? dp.req.key : '';
    if (state.ignoredOcrLines[diOcrKey] || state.ignoredReqLines[diReqKey]) continue;
    if (!dp.ocr || !dp.req) continue; // only analyze paired lines
    if (dp.matchRate >= 40) continue; // skip well-matched lines

    // Find differing words
    var oWords = getWordsFn(dp.ocr.text);
    var rWords = getWordsFn(dp.req.text);
    var oOnly = [], rOnly = [];
    oWords.forEach(function(w) { if (!rWords.has(w)) oOnly.push(w); });
    rWords.forEach(function(w) { if (!oWords.has(w)) rOnly.push(w); });

    if (oOnly.length > 0 || rOnly.length > 0) {
      partialDetails.push({
        ocrText: dp.ocr.text,
        reqText: dp.req.text,
        matchRate: dp.matchRate,
        ocrExtra: oOnly.slice(0, 5),
        reqMissing: rOnly.slice(0, 5),
      });
    }
  }

  if (partialDetails.length > 0) {
    items.push({ dot: 'warn', text: '以下 <b>' + partialDetails.length + '</b> 行差异较大，需要关注：', isSection: true });
    for (var pdi = 0; pdi < Math.min(partialDetails.length, 6); pdi++) {
      var pd = partialDetails[pdi];
      var detailText = 'OCR: <b>' + escHtml(pd.ocrText.slice(0, 80)) + (pd.ocrText.length > 80 ? '…' : '') + '</b>';
      detailText += '<br>需求: <b>' + escHtml(pd.reqText.slice(0, 80)) + (pd.reqText.length > 80 ? '…' : '') + '</b>';
      if (pd.reqMissing.length > 0) detailText += '<br><span style="color:#dc2626;">需求有但OCR未识别: ' + pd.reqMissing.join(', ') + '</span>';
      if (pd.ocrExtra.length > 0) detailText += '<br><span style="color:#3b82f6;">OCR多识别: ' + pd.ocrExtra.join(', ') + '</span>';
      items.push({ dot: pd.matchRate >= 30 ? 'warn' : 'fail', text: detailText });
    }
    if (partialDetails.length > 6) {
      items.push({ dot: 'warn', text: '…还有 ' + (partialDetails.length - 6) + ' 行差异较大，请在表格中查看' });
    }
  }

  // --- Near-miss word detection (possible OCR errors) ---
  var onlyOcr = [], onlyReq = [];
  ow.forEach(function(w) { if (!rw.has(w)) onlyOcr.push(w); });
  rw.forEach(function(w) { if (!ow.has(w)) onlyReq.push(w); });

  // Find near-misses: words in onlyReq that are within 1-2 char edits of words in onlyOcr
  var nearMisses = [];
  for (var nmi = 0; nmi < onlyReq.length; nmi++) {
    var rw = onlyReq[nmi];
    if (rw.length < 3) continue;
    for (var nmj = 0; nmj < onlyOcr.length; nmj++) {
      var ow = onlyOcr[nmj];
      if (ow.length < 3) continue;
      // Quick length check
      var lenDiff = Math.abs(rw.length - ow.length);
      if (lenDiff > 2) continue;
      // Count differing characters
      var minLen = Math.min(rw.length, ow.length);
      var maxLen = Math.max(rw.length, ow.length);
      var diffs = maxLen - minLen;
      for (var nk = 0; nk < minLen; nk++) {
        if (rw[nk] !== ow[nk]) diffs++;
        if (diffs > 2) break;
      }
      if (diffs <= 2 && diffs > 0) {
        nearMisses.push({ req: rw, ocr: ow, diffs: diffs });
        break;
      }
    }
  }

  if (nearMisses.length > 0) {
    var nearText = '';
    for (var nmi2 = 0; nmi2 < Math.min(nearMisses.length, 6); nmi2++) {
      var nm = nearMisses[nmi2];
      nearText += (nmi2 > 0 ? '；' : '') + '<b>' + nm.req + '</b> → OCR: <b>' + nm.ocr + '</b>';
    }
    items.push({ dot: 'warn', text: '疑似OCR误识别（' + nearMisses.length + '处）：' + nearText + (nearMisses.length > 6 ? '…等' : '') });
  }

  // Remaining truly missing/extra words
  var trulyMissing = onlyReq.filter(function(w) {
    return !nearMisses.some(function(nm) { return nm.req === w; });
  });
  var trulyExtra = onlyOcr.filter(function(w) {
    return !nearMisses.some(function(nm) { return nm.ocr === w; });
  });

  if (trulyMissing.length > 0) {
    var topMissing = trulyMissing.slice(0, 8).join('、');
    items.push({ dot: 'fail', text: '需求中缺失的词（前8）：<b>' + topMissing + '</b>' + (trulyMissing.length > 8 ? '…等' + trulyMissing.length + '个' : '') });
  }
  if (trulyExtra.length > 0) {
    var topExtra = trulyExtra.slice(0, 8).join('、');
    items.push({ dot: 'warn', text: 'OCR多出的词（前8）：<b>' + topExtra + '</b>' + (trulyExtra.length > 8 ? '…等' + trulyExtra.length + '个' : '') });
  }

  // Build HTML
  for (var ci = 0; ci < items.length; ci++) {
    if (items[ci].isSection) {
      reasonsHtml += '<div style="margin-top:10px;font-weight:600;font-size:13px;">' + items[ci].text + '</div>';
    } else {
      reasonsHtml += '<div class="diff-reason-item"><span class="diff-reason-dot ' + items[ci].dot + '"></span><span>' + items[ci].text + '</span></div>';
    }
  }
  reasonsEl.innerHTML = reasonsHtml;
  reasonsEl.classList.remove('hidden');
}

function toggleIgnoreLine(key, type) {
  if (type === 'ocr') {
    if (state.ignoredOcrLines[key]) {
      delete state.ignoredOcrLines[key];
    } else {
      state.ignoredOcrLines[key] = true;
    }
  } else {
    if (state.ignoredReqLines[key]) {
      delete state.ignoredReqLines[key];
    } else {
      state.ignoredReqLines[key] = true;
    }
  }
  renderDiffView();
}

function clearIgnoredLines() {
  state.ignoredOcrLines = {};
  state.ignoredReqLines = {};
  renderDiffView();
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================================================
// Check execution
// ============================================================
async function startCheck() {
  const cat = CATEGORIES.find(c => c.id === state.categoryId);
  if (!cat) return alert('请先选择物料类别');

  state.reqText = document.getElementById('reqText').value;
  if (!state.reqText.trim()) return alert('请输入需求文本');

  // Update OCR text from any textareas still in DOM
  for (let i = 0; i < state.images.length; i++) {
    const ta = document.getElementById('ocrText'+i);
    if (ta && state.images[i]) state.images[i].ocrText = ta.value;
  }

  // Build OCR text, excluding ignored lines
  var ocrParts = [];
  for (var imgI = 0; imgI < state.images.length; imgI++) {
    var img = state.images[imgI];
    if (!img.ocrText) continue;
    var lines = img.ocrText.split('\n');
    var keptLines = [];
    for (var li = 0; li < lines.length; li++) {
      if (!state.ignoredOcrLines[imgI + '_' + li]) {
        keptLines.push(lines[li]);
      }
    }
    if (keptLines.length > 0) ocrParts.push(keptLines.join('\n'));
  }
  const allOcr = ocrParts.join('\n---\n');

  // Build requirement text, excluding ignored lines
  var reqLines = state.reqText.split('\n');
  var keptReqLines = [];
  for (var rli = 0; rli < reqLines.length; rli++) {
    if (!state.ignoredReqLines['r_' + rli]) {
      keptReqLines.push(reqLines[rli]);
    }
  }
  const req = keptReqLines.join('\n');
  const ocrDates = extractDates(allOcr);
  const reqDates = extractDates(req);
  const ocrCDKs = extractCDKs(allOcr);
  const reqCDKs = extractCDKs(req);

  state.checkResults = {};

  for (const check of cat.checks) {
    let status = 'pending', detail = '';

    switch (check.id) {
      case 'en_accurate': {
        const enImgs = state.images.filter(img => img.lang === 'EN');
        if (enImgs.length === 0) {
          status = 'warn'; detail = '未检测到EN语言标识的图片，请确认是否已上传英文版本';
        } else {
          const sims = enImgs.map(img => calcSimilarity(img.ocrText, req));
          const avg = sims.reduce((a,b) => a+b, 0) / sims.length;
          status = avg > 0.3 ? 'pass' : avg > 0.1 ? 'warn' : 'fail';
          detail = 'EN图片文字匹配度: ' + Math.round(avg * 100) + '%。匹配度较低时请人工核实。';
        }
        break;
      }
      case 'ru_accurate': {
        const ruImgs = state.images.filter(img => img.lang === 'RU');
        if (ruImgs.length === 0) {
          status = 'warn'; detail = '未检测到RU语言标识的图片，请确认是否已上传俄文版本';
        } else {
          const sims = ruImgs.map(img => calcSimilarity(img.ocrText, req));
          const avg = sims.reduce((a,b) => a+b, 0) / sims.length;
          status = avg > 0.2 ? 'pass' : avg > 0.05 ? 'warn' : 'fail';
          detail = 'RU图片文字匹配度: ' + Math.round(avg * 100) + '%。俄文OCR准确率较低，建议人工核实。';
        }
        break;
      }
      case 'hero_accurate': {
        const kws = extractHeroKeywords(req);
        const { found, missing } = findPhrases(allOcr, kws);
        if (missing.length === 0 && found.length > 0) {
          status = 'pass'; detail = '已匹配关键词: ' + found.join('、');
        } else if (found.length > 0) {
          status = 'warn'; detail = '已匹配: ' + found.join('、') + '；未找到: ' + missing.join('、');
        } else {
          status = 'warn'; detail = '未能从图片中识别到相关关键词，请人工核实。';
        }
        break;
      }
      case 'author_accurate': {
        const re = /(?:提供|作者|攻略|Author|Guide\s*by|Created\s*by)[:：]?\s*([A-Za-z一-鿿0-9_\-]+)/gi;
        const ra = [], oa = []; let m;
        while ((m = re.exec(req)) !== null) ra.push(m[1].trim());
        while ((m = re.exec(allOcr)) !== null) oa.push(m[1].trim());
        if (ra.length === 0) {
          status = 'warn'; detail = '需求文本中未检测到作者姓名信息，请人工确认。';
        } else if (oa.some(a => ra.some(r => r.includes(a) || a.includes(r)))) {
          status = 'pass'; detail = '需求作者: ' + ra.join('、') + '；图片中检测到匹配。';
        } else {
          status = 'warn'; detail = '需求作者: ' + ra.join('、') + '；图片中未明确匹配，请核实。';
        }
        break;
      }
      case 'cdk_image_match': {
        if (reqCDKs.length === 0) {
          status = 'warn'; detail = '需求文本中未检测到CDK码，请手动输入。';
        } else if (ocrCDKs.length === 0) {
          status = 'fail'; detail = '图片中未检测到CDK码。请检查图片或手动编辑OCR结果。';
        } else {
          const matched = ocrCDKs.filter(oc => reqCDKs.some(rc => rc.toUpperCase() === oc.toUpperCase()));
          if (matched.length === reqCDKs.length) {
            status = 'pass'; detail = 'CDK匹配成功: ' + matched.join('、');
          } else if (matched.length > 0) {
            status = 'warn'; detail = '部分匹配: ' + matched.join('、') + '。图片: ' + ocrCDKs.join('、') + '；需求: ' + reqCDKs.join('、');
          } else {
            status = 'fail'; detail = 'CDK不匹配！图片: ' + ocrCDKs.join('、') + '；需求: ' + reqCDKs.join('、');
          }
        }
        break;
      }
      case 'cdk_redeem':
        status = 'manual'; detail = 'CDK兑换验证需要实际操作游戏内兑换入口确认。';
        break;
      case 'cdk_validity': {
        if (ocrDates.length === 0 && reqDates.length === 0) {
          status = 'warn'; detail = '未能检测到日期信息。';
        } else if (reqDates.length === 0) {
          status = 'warn'; detail = '图片日期: ' + ocrDates.join('、') + '，需求中未发现日期。';
        } else if (ocrDates.length === 0) {
          status = 'fail'; detail = '需求日期: ' + reqDates.join('、') + '，图片中未检测到日期。';
        } else {
          const no = ocrDates.map(normDate), nr = reqDates.map(normDate);
          const match = nr.some(rd => no.some(od => od.includes(rd) || rd.includes(od)));
          status = match ? 'pass' : 'fail';
          detail = match ? '日期一致：' + ocrDates.join('、') + ' ↔ ' + reqDates.join('、') : '日期不一致！图片: ' + ocrDates.join('、') + ' vs 需求: ' + reqDates.join('、');
        }
        break;
      }
      case 'time_accurate': {
        if (ocrDates.length === 0) {
          status = 'fail'; detail = '图片中未检测到时间信息，请检查清晰度或手动编辑OCR结果。';
        } else if (reqDates.length === 0) {
          status = 'warn'; detail = '图片: ' + ocrDates.join('、') + '，需求中未发现日期。';
        } else {
          const no = ocrDates.map(normDate), nr = reqDates.map(normDate);
          const match = nr.some(rd => no.some(od => od.includes(rd) || rd.includes(od)));
          status = match ? 'pass' : 'fail';
          detail = match ? '时间一致：' + ocrDates.join('、') + ' ↔ ' + reqDates.join('、') : '时间不一致！图片: ' + ocrDates.join('、') + ' vs 需求: ' + reqDates.join('、');
        }
        break;
      }
      case 'en_correct': {
        const enImgs = state.images.filter(img => img.lang === 'EN');
        if (enImgs.length === 0) { status = 'warn'; detail = '未检测到EN语言标识的图片。'; }
        else {
          const sims = enImgs.map(img => calcSimilarity(img.ocrText, req));
          const avg = sims.reduce((a,b) => a+b, 0) / sims.length;
          status = avg > 0.3 ? 'pass' : avg > 0.1 ? 'warn' : 'fail';
          detail = 'EN公告图片匹配度: ' + Math.round(avg * 100) + '%。';
        }
        break;
      }
      case 'ru_correct': {
        const ruImgs = state.images.filter(img => img.lang === 'RU');
        if (ruImgs.length === 0) { status = 'warn'; detail = '未检测到RU语言标识的图片。'; }
        else {
          const sims = ruImgs.map(img => calcSimilarity(img.ocrText, req));
          const avg = sims.reduce((a,b) => a+b, 0) / sims.length;
          status = avg > 0.2 ? 'pass' : avg > 0.05 ? 'warn' : 'fail';
          detail = 'RU公告图片匹配度: ' + Math.round(avg * 100) + '%。';
        }
        break;
      }
      case 'text_correct': {
        if (!allOcr.trim()) { status = 'warn'; detail = '图片OCR结果为空，请先识别文字。'; }
        else {
          const sim = calcSimilarity(allOcr, req);
          if (sim > 0.4) status = 'pass';
          else if (sim > 0.15) status = 'warn';
          else status = 'fail';
          detail = '图片文案匹配度: ' + Math.round(sim * 100) + '%。匹配度低时请人工逐句核对。';
        }
        break;
      }
      case 'lang_filename': {
        const required = ['EN','RU','DE','FR'];
        const imgLangs = state.images.map(img => img.lang).filter(Boolean);
        const missingL = required.filter(l => !imgLangs.includes(l));
        const extraL = imgLangs.filter(l => !required.includes(l));
        if (missingL.length === 0 && extraL.length === 0) {
          status = 'pass'; detail = '四语文件齐全: ' + imgLangs.join('、') + '，均与文件名一致。';
        } else if (missingL.length > 0) {
          status = 'fail'; detail = '缺少语种: ' + missingL.join('、') + '。已检测: ' + (imgLangs.join('、') || '无');
        } else {
          status = 'warn'; detail = '多出语种: ' + extraL.join('、') + '。已检测: ' + imgLangs.join('、');
        }
        break;
      }
      case 'platform_match':
        status = 'manual'; detail = '请人工检查图片中跳转链接/二维码指向的平台是否与需求一致。';
        break;
      case 'reward_icon_match':
        status = 'manual'; detail = '请人工比对奖励图标是否与需求文档中描述一致。';
        break;
      case 'reward_icon_bg':
        status = 'manual'; detail = '请人工确认奖励图标背景颜色是否统一。';
        break;
    }

    state.checkResults[check.id] = { status, detail };
  }

  goToStep(4);
  renderResults(cat);
}

// ============================================================
// Results rendering
// ============================================================
function renderResults(cat) {
  const results = state.checkResults;
  let pass = 0, fail = 0, warn = 0, manual = 0;
  for (const c of cat.checks) {
    const s = results[c.id]?.status;
    if (s === 'pass') pass++;
    else if (s === 'fail') fail++;
    else if (s === 'warn') warn++;
    else if (s === 'manual') manual++;
  }

  // Summary
  document.getElementById('resultSummary').innerHTML = `
    <div class="result-card pass"><div class="count">${pass}</div><div class="label">通过</div></div>
    <div class="result-card fail"><div class="count">${fail}</div><div class="label">未通过</div></div>
    <div class="result-card warn"><div class="count">${warn}</div><div class="label">需确认</div></div>
    <div class="result-card manual"><div class="count">${manual}</div><div class="label">人工核实</div></div>
  `;

  // Check items
  const icons = { pass: '&#10004;', fail: '&#10008;', warn: '&#9888;', manual: '&#128065;', pending: '&#9203;' };
  const labels = { pass: '通过', fail: '未通过', warn: '需确认', manual: '人工核实', pending: '待检查' };
  document.getElementById('checkItems').innerHTML = cat.checks.map(c => {
    const r = results[c.id] || { status:'pending', detail:'' };
    return `
      <div class="check-item ${r.status}">
        <div class="status-icon">${icons[r.status]}</div>
        <div class="check-body">
          <div class="check-label">${c.label}</div>
          <div class="check-desc">${c.desc}</div>
          ${r.detail ? '<div class="check-detail">'+r.detail+'</div>' : ''}
        </div>
        <span class="status-badge">${labels[r.status]}</span>
      </div>
    `;
  }).join('');

  // Verdict
  const vEl = document.getElementById('verdict');
  if (fail > 0) {
    vEl.className = 'verdict fail';
    vEl.innerHTML = '&#10008; 发现 ' + fail + ' 项未通过，请修正后重新检查';
  } else if (warn > 0 || manual > 0) {
    vEl.className = 'verdict warn';
    vEl.innerHTML = '&#9888; 自动检查项已通过，还有 ' + (warn + manual) + ' 项需要人工确认';
  } else {
    vEl.className = 'verdict pass';
    vEl.innerHTML = '&#10004; 所有检查项均已通过！';
  }
}

// Export

function exportReport() {
  const cat = CATEGORIES.find(c => c.id === state.categoryId);
  if (!cat || !state.checkResults) return;

  const results = state.checkResults;
  const labels = { pass: '通过', fail: '未通过', warn: '需确认', manual: '人工核实' };

  let text = '物料质量检查报告\n';
  text += '类别: ' + cat.name + '\n';
  text
